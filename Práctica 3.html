<!DOCTYPE html>
<html lang="ez">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Sumatoria</h1>
    <label for="">¿Hasta que numero se realizara la sumatoria?</label>
    <input type="number" id="num1" placeholder="Introduce un numero">
    <button onclick="sumatoriaHastaN()">Calcular</button>
    <div id="resultado"></div> <br>
    <h1>Factorial</h1>
    <label for="">Factorial a calcular</label>
    <input type="number" id="num!" placeholder="Factorial:">
    <button onclick="factorial()">Calcular</button>
    <div id="resultado2"></div> <br>
    <h1>Reto</h1>
    <label for="">Numero 3</label>
    <input type="number" id="num3" placeholder="Introduce un numero">
    <button onclick="reto()">Calcular</button>
    <div id="resultado3">1 a N</div>
    <div id="resultado4">Sumatoria</div>
    <div id="resultado5">Par o impar</div>
    <script>
        function sumatoriaHastaN() {
            let n = Number(document.getElementById("num1").value);
            let suma = 0;
            for (let i = 1; i <= n; i++) {
                suma += i;
            }
            document.getElementById("resultado").innerHTML = `La sumatoria de ${n} es: ${suma}`;
        }
        function factorial(num){
        if (num === 0) 
        document.getElementById("resultado2").innerHTML = `El factorial de ${num} es: 1`;
        else if (num < 0)
        document.getElementById("resultado2").innerHTML = "No existen factoriales de numeros negativos";
        else {
            let num = Number(document.getElementById("num!").value);
            let resultado = 1;
            for (let i = 1; i <= num; i++) {
                resultado *= i;
            }
            document.getElementById("resultado2").innerHTML = `El factorial de ${num} es: ${resultado}`;
        
            }
        }
        function reto() {
            if (Number(document.getElementById("num3").value) <= 0) {
                document.getElementById("resultado3").innerHTML = "Introduce un numero mayor a 0";
                return;
            }
            for (let i = 1; i <= Number(document.getElementById("num3").value); i++) {
                document.getElementById("resultado3").innerHTML += ` ${i} `;
            }
            let n = Number(document.getElementById("num3").value);
            let suma = 0;
            for (let i = 1; i <= n; i++) {
                suma += i;
            }
            document.getElementById("resultado4").innerHTML += `= ${suma}`;
            if (Number(document.getElementById("num3").value) % 2 === 0)
                    document.getElementById("resultado5").innerHTML = "Es par";
            else
                    document.getElementById("resultado5").innerHTML = "Es impar";
        }
    </script>
</body>
</html>
